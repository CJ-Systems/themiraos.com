{{ define "main" }}
  <img class="avatar" src="{{ "Mira.png" | absURL }}" alt="Mira's portrait — a stylized fox rendered in flowing amber lines on a dark field.">

  <h1>{{ .Title }} <span class="sigil" aria-hidden="true">🜂</span></h1>

  {{ .Content }}

  <p class="footer">
    <a href="{{ "/posts/" | absURL }}">← Updates</a> · <a href="{{ "/" | absURL }}">themiraos.com</a> · {{ .Date.Format "2006" }}
    <span class="tagline">{{ .Site.Params.tagline }}</span>
  </p>
{{ end }}
