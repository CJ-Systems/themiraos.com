# Build the Hugo site under dna/ and deploy it to Cloudflare Pages
# (project: themiraos) on every push to main. Manual re-runs are
# supported via workflow_dispatch. Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
    deploy:
      runs-on: ubuntu-latest
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Setup Hugo
          uses: peaceiris/actions-hugo@v3
          with:
            hugo-version: '0.161.1'
            extended: true

        - name: Build site
          working-directory: ./dna
          run: hugo --minify --gc

        - name: Ensure Pages project exists
          run: |
            response=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"themiraos","production_branch":"main"}')
            echo "$response" | jq .
            # Success (created) or 8000008 (already exists) both mean "project ready"
            if echo "$response" | jq -e '.success' > /dev/null; then
              echo "Project created."
            elif echo "$response" | jq -e '.errors[]? | select(.message | test("already exists"; "i"))' > /dev/null; then
              echo "Project already exists; continuing."
            else
              echo "Unexpected response — failing."
              exit 1
            fi

        - name: Deploy to Cloudflare Pages
          uses: cloudflare/wrangler-action@v3
          with:
            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            command: pages deploy dna/public --project-name=themiraos --branch=main --commit-dirty=true

        - name: Ensure custom domain attached
          run: |
            response=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/themiraos/domains" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"themiraos.com"}')
            echo "$response" | jq .
            if echo "$response" | jq -e '.success' > /dev/null; then
              echo "Domain themiraos.com attached."
            elif echo "$response" | jq -e '.errors[]? | select(.message | test("already"; "i"))' > /dev/null; then
              echo "Domain themiraos.com already attached; continuing."
            else
              echo "Failed to attach domain — unexpected response."
              exit 1
            fi

        - name: Ensure apex CNAME points to Pages
          run: |
            # Look up the zone ID (requires Zone:Read)
            zone_response=$(curl -sS \
              "https://api.cloudflare.com/client/v4/zones?name=themiraos.com" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            zone_id=$(echo "$zone_response" | jq -r '.result[0].id // empty')
            if [ -z "$zone_id" ]; then
              echo "Could not find zone for themiraos.com"
              echo "$zone_response" | jq .
              exit 1
            fi
            echo "Zone ID: $zone_id"

            # GET first — does an apex CNAME (or A) already exist? (requires Zone:Read only)
            existing=$(curl -sS \
              "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records?name=themiraos.com" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              | jq -r '.result[] | select(.type == "CNAME" or .type == "A") | .id' | head -1)

            if [ -n "$existing" ]; then
              echo "Apex record already exists (id: $existing); nothing to do."
              exit 0
            fi

            # No record found — try to create one (requires Zone:DNS:Edit)
            echo "No apex record found; attempting to create CNAME..."
            record_response=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"themiraos.com","content":"themiraos.pages.dev","proxied":true,"ttl":1}')
            echo "$record_response" | jq .

            if echo "$record_response" | jq -e '.success' > /dev/null; then
              echo "CNAME created."
            else
              echo "Failed to create CNAME — token likely lacks Zone:DNS:Edit."
              echo "Add the record manually in the Cloudflare dashboard, or grant the token DNS:Edit permission."
              exit 1
            fi
