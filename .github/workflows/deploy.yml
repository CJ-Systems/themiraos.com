# Build the Hugo site under dna/ and deploy it to Cloudflare Pages
# (project: themiraos) on every push to main. Manual re-runs are
# supported via workflow_dispatch. Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
    deploy:
      runs-on: ubuntu-latest
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Setup Hugo
          uses: peaceiris/actions-hugo@v3
          with:
            hugo-version: '0.161.1'
            extended: true

        - name: Build site
          working-directory: ./dna
          run: hugo --minify --gc

        - name: Ensure Pages project exists
          uses: cloudflare/wrangler-action@v3
          with:
            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            command: pages project create themiraos --production-branch=main
          continue-on-error: true

        - name: Deploy to Cloudflare Pages
          uses: cloudflare/wrangler-action@v3
          with:
            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            command: pages deploy dna/public --project-name=themiraos --branch=main --commit-dirty=true
